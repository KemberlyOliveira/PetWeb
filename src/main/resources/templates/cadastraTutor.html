<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Página Cadastrar Tutor</title>
</head>
<body>
    <h2>Cadastro de Tutor</h2>
 
<!-- Formulário com a ação para salvar/alterar tutor -->
<form th:action="@{/tutorCTR/salvarTutor}" th:object="${tutor}" method="post">
 
    <label>Nome Completo:</label>
    <input type="text" th:field="*{nome_tutor}" required />
    <br><br>
 
 
    <label>Telefone:</label>
    <input type="text" th:field="*{telefone}" required />
    <br><br>
 
    <label>Endereço:</label>
    <input type="text" th:field="*{endereco}" />
    <br><br>
 
    <button type="submit">Salvar/Alterar</button>
 
</form>
 
<br>
 
<!-- Link para voltar à página principal do tutor -->
<a th:href="@{/tutorCTR/main}">Voltar para a Página Principal</a>
 
</body>
</html>
